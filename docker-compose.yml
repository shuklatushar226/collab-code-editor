version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collab_editor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  # Redis Cache + Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: collab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-net

  # Backend API + WebSocket Server
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: collab-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: collab_editor
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      EXECUTOR_URL: http://executor:3003
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/src:ro
      - ./shared/src:/shared/src:ro
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Code Execution Engine
  executor:
    build:
      context: executor
      dockerfile: Dockerfile
    container_name: collab-executor
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp:/tmp
    ports:
      - "3003:3003"
    networks:
      - collab-net
    security_opt:
      - no-new-privileges:true

  # Nginx Reverse Proxy (for production-like local testing)
  nginx:
    image: nginx:alpine
    container_name: collab-nginx
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    networks:
      - collab-net
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  collab-net:
    driver: bridge
